version: "3.9"

##############################################################################
# docker-compose.microservices.yml — standalone microservices development stack
#
# Uses separate PostgreSQL instances per service (postgres-auth, postgres-purchase,
# etc.) each with its own data volume.
#
# PostgreSQL credentials: uses DB_USER / DB_PASSWORD from .env (default: postgres/postgres),
# matching the convention of all other compose files in this project.
#
# IMPORTANT: POSTGRES_PASSWORD is only applied on FIRST initialisation of each
# volume. If you previously ran with different credentials, delete the volumes:
#   docker compose -f docker-compose.microservices.yml down -v
##############################################################################

networks:
  microservices:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_purchase_data:
  postgres_payment_data:
  postgres_chat_data:
  postgres_reputation_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  clickhouse_data:
  minio_data:
  elasticsearch_data:

services:
  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - microservices
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - microservices
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - microservices

  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-purchase:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PURCHASE_DB_NAME:-purchase_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_purchase_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PAYMENT_DB_NAME:-payment_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-chat:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${CHAT_DB_NAME:-chat_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_chat_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    environment:
      CLICKHOUSE_DB: chat_history
      CLICKHOUSE_USER: clickhouse_user
      CLICKHOUSE_PASSWORD: clickhouse_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - microservices
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    networks:
      - microservices
    restart: unless-stopped

  postgres-reputation:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${REPUTATION_DB_NAME:-reputation_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_reputation_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  centrifugo:
    image: centrifugo/centrifugo:v5
    volumes:
      - ./services/chat-service/centrifugo/centrifugo.json:/centrifugo/config.json
    command: centrifugo -c /centrifugo/config.json
    ports:
      - "8000:8000"
      - "9001:9001"
    networks:
      - microservices
    restart: unless-stopped
    depends_on:
      - redis

  # ─────────────────────────────────────────────
  # Application Services
  # ─────────────────────────────────────────────

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      AUTH_SERVICE_URL: http://auth-service:4001
      PURCHASE_SERVICE_URL: http://purchase-service:4002
      PAYMENT_SERVICE_URL: http://payment-service:4003
      CHAT_SERVICE_URL: http://chat-service:4004
      SEARCH_SERVICE_URL: http://search-service:4007
      REPUTATION_SERVICE_URL: http://reputation-service:4008
      ANALYTICS_SERVICE_URL: http://analytics-service:4006
      NOTIFICATION_SERVICE_URL: http://notification-service:4005
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-60}
      VOTING_RATE_LIMIT_RPM: ${VOTING_RATE_LIMIT_RPM:-120}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      - redis
      - auth-service
      - purchase-service
      - payment-service
      - chat-service
      - search-service
      - reputation-service
    networks:
      - microservices
    restart: unless-stopped

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres-auth:5432/${AUTH_DB_NAME:-auth_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 10
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservices
    restart: unless-stopped

  purchase-service:
    build:
      context: ./services/purchase-service
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres-purchase:5432/${PURCHASE_DB_NAME:-purchase_db}
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: purchase-service
      KAFKA_GROUP_ID: purchase-group
    depends_on:
      postgres-purchase:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - microservices
    restart: unless-stopped

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    ports:
      - "4003:4003"
    environment:
      PORT: 4003
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres-payment:5432/${PAYMENT_DB_NAME:-payment_db}
      KAFKA_BROKERS: kafka:9092
      STRIPE_SECRET_KEY: sk_test_placeholder
      YOOKASSA_SHOP_ID: placeholder_shop_id
      YOOKASSA_SECRET_KEY: placeholder_secret
    depends_on:
      postgres-payment:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - microservices
    restart: unless-stopped

  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    ports:
      - "4004:4004"
    environment:
      PORT: 4004
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres-chat:5432/${CHAT_DB_NAME:-chat_db}
      CENTRIFUGO_URL: http://centrifugo:8000
      CENTRIFUGO_API_KEY: centrifugo_api_key
      CLICKHOUSE_DSN: clickhouse://clickhouse_user:clickhouse_password@clickhouse:9000/chat_history
    depends_on:
      postgres-chat:
        condition: service_healthy
      centrifugo:
        condition: service_started
    networks:
      - microservices
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    ports:
      - "4005:4005"
    environment:
      PORT: 4005
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: notification-group
      CENTRIFUGO_URL: http://centrifugo:8000
      CENTRIFUGO_API_KEY: centrifugo_api_key
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_USER: notifications@example.com
      SMTP_PASS: smtp_password
      FCM_SERVER_KEY: fcm_server_key_placeholder
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      WHATSAPP_API_URL: "${WHATSAPP_API_URL:-}"
      WHATSAPP_ACCESS_TOKEN: "${WHATSAPP_ACCESS_TOKEN:-}"
      WHATSAPP_PHONE_NUMBER_ID: "${WHATSAPP_PHONE_NUMBER_ID:-}"
      WHATSAPP_VERIFY_TOKEN: "${WHATSAPP_VERIFY_TOKEN:-}"
    depends_on:
      - kafka
      - centrifugo
    networks:
      - microservices
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    ports:
      - "4006:4006"
    environment:
      PORT: 4006
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: analytics-group
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio_admin
      S3_SECRET_KEY: minio_password
      S3_BUCKET: analytics-reports
      CLICKHOUSE_DSN: clickhouse://clickhouse_user:clickhouse_password@clickhouse:9000/chat_history
    depends_on:
      - kafka
      - minio
    networks:
      - microservices
    restart: unless-stopped

  search-service:
    build:
      context: ./services/search-service
      dockerfile: Dockerfile
    ports:
      - "4007:4007"
    environment:
      PORT: 4007
      ELASTICSEARCH_URL: http://elasticsearch:9200
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - microservices
    restart: unless-stopped

  reputation-service:
    build:
      context: ./services/reputation-service
      dockerfile: Dockerfile
    ports:
      - "4008:4008"
    environment:
      PORT: 4008
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres-reputation:5432/${REPUTATION_DB_NAME:-reputation_db}
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres-reputation:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - microservices
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Monitoring
  # ─────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"
    networks:
      - microservices
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/dashboard.json:/var/lib/grafana/dashboards/main.json
    ports:
      - "3001:3000"
    networks:
      - microservices
    depends_on:
      - prometheus
    restart: unless-stopped
