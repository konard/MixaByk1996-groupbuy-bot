---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: groupbuy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
        - name: chat-service
          image: groupbuy/chat-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4004
          env:
            - name: PORT
              value: "4004"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chat-service-secret
                  key: database-url
            - name: CENTRIFUGO_URL
              value: "http://centrifugo:8000"
            - name: CENTRIFUGO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: centrifugo-secret
                  key: api-key
            - name: CLICKHOUSE_DSN
              valueFrom:
                secretKeyRef:
                  name: chat-service-secret
                  key: clickhouse-dsn
          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: groupbuy
spec:
  selector:
    app: chat-service
  ports:
    - port: 4004
      targetPort: 4004
---
apiVersion: v1
kind: Secret
metadata:
  name: chat-service-secret
  namespace: groupbuy
type: Opaque
stringData:
  database-url: postgresql://chat_user:chat_password@postgres:5432/chat_db
  clickhouse-dsn: clickhouse://clickhouse_user:clickhouse_password@clickhouse:9000/chat_history
