groups:
  # ─── Service Health ──────────────────────────────────────────────────────────
  - name: service_health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{status=~"5.."}[5m])
            /
            rate(http_requests_total[5m])
          ) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.job }}"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.job }}"
          description: "p95 latency is {{ $value }}s for {{ $labels.job }}"

  # ─── Resource Alerts ─────────────────────────────────────────────────────────
  - name: resource_alerts
    rules:
      - alert: HighMemoryUsage
        expr: |
          (process_resident_memory_bytes / 1024 / 1024) > 800
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.job }}"
          description: "Memory usage is {{ $value }}MB"

      - alert: DatabaseConnectionPoolExhausted
        expr: |
          pg_stat_database_numbackends / pg_settings_max_connections > 0.8
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL connection pool near exhaustion"
          description: "{{ $value | humanizePercentage }} of connections used"

  # ─── Kafka Alerts ────────────────────────────────────────────────────────────
  - name: kafka_alerts
    rules:
      - alert: KafkaConsumerLag
        expr: |
          kafka_consumer_group_lag > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group {{ $labels.consumergroup }} lag is {{ $value }} on topic {{ $labels.topic }}"

      - alert: KafkaProducerErrors
        expr: |
          rate(kafka_producer_record_error_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Kafka producer errors detected"
          description: "Producer errors on {{ $labels.job }}: {{ $value }}/s"

  # ─── Business Alerts ─────────────────────────────────────────────────────────
  - name: business_alerts
    rules:
      - alert: PaymentHoldFailureRate
        expr: |
          (
            rate(payment_hold_failures_total[5m])
            /
            rate(payment_hold_attempts_total[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Payment hold failure rate is high"
          description: "{{ $value | humanizePercentage }} of hold attempts are failing"

      - alert: VotingSessionAutoCloseBacklog
        expr: |
          voting_sessions_expired_open > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Voting sessions not being auto-closed"
          description: "{{ $value }} expired sessions still open"

  # ─── Redis Alerts ────────────────────────────────────────────────────────────
  - name: redis_alerts
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis instance {{ $labels.instance }} is not responding"

      - alert: RedisHighMemory
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage is high"
          description: "{{ $value | humanizePercentage }} of max memory used"

  # ─── Centrifugo Alerts ────────────────────────────────────────────────────────
  - name: centrifugo_alerts
    rules:
      - alert: CentrifugoHighConnections
        expr: centrifugo_node_num_clients > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Centrifugo connection count high"
          description: "{{ $value }} concurrent WebSocket connections"
