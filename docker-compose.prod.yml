# Production deployment configuration (single server)
# Before running:
#   1. Copy .env.example to .env and fill in all variables
#   2. Set DOMAIN=your-domain.com in .env
#   3. Set CERTBOT_EMAIL=your@email.com in .env
#   4. Run: bash scripts/init-letsencrypt.sh   (first-time SSL setup)
#   5. Run: docker compose -f docker-compose.prod.yml up -d
#
# Two-server deployment: see docker-compose.two-server.yml
#
# Images are built by CI and pushed to GitHub Container Registry (ghcr.io).
# Set IMAGE_TAG in .env to pin a specific version (default: main).
# Example .env entries:
#   REGISTRY=ghcr.io
#   IMAGE_PREFIX=mixabyk1996/groupbuy-bot
#   IMAGE_TAG=main

services:
  # Django Admin API (Python backend for /api/admin/* endpoints and admin panel)
  # To create a superuser for the admin panel, run:
  #   docker compose -f docker-compose.prod.yml exec django-admin python manage.py createsuperuser
  django-admin:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/django-admin:${IMAGE_TAG:-main}
    container_name: groupbuy-django-admin
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-groupbuy}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-change-this-in-production}
      - DEBUG=False
      - ALLOWED_HOSTS=${DOMAIN:-localhost},127.0.0.1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/admin/auth/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Core API (Rust backend)
  # NOTE: If you see "password authentication failed for user postgres" errors,
  # the PostgreSQL volume was likely created with a different password.
  # Fix: docker compose -f docker-compose.prod.yml down && docker volume rm groupbuy-bot_postgres_data
  # Or use: bash scripts/setup-prod.sh --reset-db
  core:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/core:${IMAGE_TAG:-main}
    container_name: groupbuy-core
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-groupbuy}
      - REDIS_URL=redis://redis:6379/0
      - PORT=8000
      - RUST_LOG=${RUST_LOG:-info,groupbuy_api=info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Bot service (Telegram / VK message handler)
  bot:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/bot:${IMAGE_TAG:-main}
    container_name: groupbuy-bot
    restart: unless-stopped
    environment:
      - CORE_API_URL=http://core:8000/api
      - REDIS_URL=redis://redis:6379/1
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      core:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - groupbuy-network

  # SOCKS5 proxy for Telegram API (useful when api.telegram.org is blocked)
  # Enable by setting TELEGRAM_USE_PROXY=true in .env
  telegram-proxy:
    image: serjs/go-socks5-proxy:latest
    container_name: groupbuy-telegram-proxy
    restart: unless-stopped
    networks:
      - groupbuy-network
    profiles:
      - proxy

  # Telegram adapter
  telegram-adapter:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/telegram-adapter:${IMAGE_TAG:-main}
    container_name: groupbuy-telegram-adapter
    restart: unless-stopped
    environment:
      - BOT_SERVICE_URL=http://bot:8001
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_PROXY_URL=${TELEGRAM_PROXY_URL:-}
      - TELEGRAM_USE_PROXY=${TELEGRAM_USE_PROXY:-false}
    depends_on:
      - bot
    networks:
      - groupbuy-network

  # Mattermost adapter
  mattermost-adapter:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/mattermost-adapter:${IMAGE_TAG:-main}
    container_name: groupbuy-mattermost-adapter
    restart: unless-stopped
    environment:
      - BOT_SERVICE_URL=http://bot:8001
      - MATTERMOST_URL=${MATTERMOST_URL}
      - MATTERMOST_TOKEN=${MATTERMOST_TOKEN}
      - MATTERMOST_WEBHOOK_URL=${MATTERMOST_WEBHOOK_URL}
    ports:
      - "8002:8002"
    depends_on:
      - bot
    networks:
      - groupbuy-network

  # WebSocket server for real-time chat
  websocket-server:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/websocket:${IMAGE_TAG:-main}
    container_name: groupbuy-websocket
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/2
      - CORE_API_URL=http://core:8000/api
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      core:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # React frontend (production build)
  frontend-react:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-mixabyk1996/groupbuy-bot}/frontend:${IMAGE_TAG:-main}
    container_name: groupbuy-frontend
    restart: unless-stopped
    depends_on:
      - core
    networks:
      - groupbuy-network

  # PostgreSQL database (tuned for production)
  # IMPORTANT: POSTGRES_PASSWORD is only used on first initialization of the data volume.
  # If the volume already exists with a different password, you must delete it:
  #   docker volume rm groupbuy-bot_postgres_data
  postgres:
    image: postgres:16-alpine
    container_name: groupbuy-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-groupbuy}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - groupbuy-network
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c random_page_cost=1.1
    healthcheck:
      # Use pg_isready with explicit -U flag populated from the env var at container level.
      # The variable is available inside the container because POSTGRES_USER is set above.
      test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis (persistent, with memory limit)
  redis:
    image: redis:7-alpine
    container_name: groupbuy-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    networks:
      - groupbuy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx reverse proxy with SSL
  # On first run without SSL certs, a temporary self-signed certificate is generated
  # so the app is accessible via http://<server-ip> immediately.
  # Replace with real certs using: bash scripts/init-letsencrypt.sh
  #
  # NOTE: If you get "failed to bind host port ... address already in use" for port 80 or 443,
  # another process (e.g. nginx, Apache) is already listening on that port.
  # Fix: stop the conflicting service first:
  #   sudo systemctl stop nginx    # or apache2, caddy, etc.
  # Or use setup-prod.sh which detects and handles port conflicts automatically.
  nginx:
    image: nginx:alpine
    container_name: groupbuy-nginx
    restart: unless-stopped
    entrypoint: ["/docker-entrypoint-custom.sh"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx-api.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/docker-entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt_data:/etc/letsencrypt:ro
    depends_on:
      core:
        condition: service_healthy
      django-admin:
        condition: service_started
      websocket-server:
        condition: service_started
      frontend-react:
        condition: service_started
    networks:
      - groupbuy-network

  # Certbot for automatic Let's Encrypt SSL certificate renewal
  certbot:
    image: certbot/certbot:latest
    container_name: groupbuy-certbot
    restart: unless-stopped
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Renew certificates twice a day; certbot only acts when < 30 days remain
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    networks:
      - groupbuy-network

volumes:
  postgres_data:
  redis_data:
  letsencrypt_data:
  certbot_webroot:

networks:
  groupbuy-network:
    driver: bridge
